services:
  mysql:
    image: mysql:8.4
    container_name: course-arrangement-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: course_arrangement
      MYSQL_USER: course_user
      MYSQL_PASSWORD: course_password
    ports:
      - "3307:3306"
    volumes:
      - course_arrangement_data:/var/lib/mysql
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  course_arrangement_data:
